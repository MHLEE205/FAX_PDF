let userName = '';

function _genVerifier() {
  const a = new Uint8Array(32);
  crypto.getRandomValues(a);
  return btoa(String.fromCharCode(...a)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

async function _genChallenge(v) {
  const d = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(v));
  return btoa(String.fromCharCode(...new Uint8Array(d))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

async function login() {
  const v  = _genVerifier();
  const c  = await _genChallenge(v);
  const st = Math.random().toString(36).slice(2);
  sessionStorage.setItem('pkce_verifier', v);
  sessionStorage.setItem('oauth_state',   st);
  const p = new URLSearchParams({
    client_id: OAUTH.clientId, response_type: 'code',
    redirect_uri: OAUTH.redirectUri, scope: OAUTH.scopes,
    code_challenge: c, code_challenge_method: 'S256', state: st
  });
  window.location.href =
    `https://login.microsoftonline.com/${OAUTH.tenantId}/oauth2/v2.0/authorize?${p}`;
}

function logout() {
  sessionStorage.removeItem('fax_access_token');
  location.reload();
}

async function _checkAuth() {
  const token = sessionStorage.getItem('fax_access_token');
  if (!token) return false;
  try {
    const r = await fetch('https://graph.microsoft.com/v1.0/me',
      { headers: { Authorization: 'Bearer ' + token } });
    if (!r.ok) throw new Error('token_invalid');
    const u = await r.json();
    userName = u.displayName || u.mail || 'ユーザー';
    document.getElementById('user-display').textContent = '👤 ' + userName + ' さん';
    document.getElementById('logout-btn').style.display = 'inline';
    return true;
  } catch(e) {
    sessionStorage.removeItem('fax_access_token');
    return false;
  }
}

// ── ブロック HTML 生成 ────────────────────────────────────
function _blockHtml(key, n, hi, removable) {
  hi = hi || {};
  const hiPacker = (hi.packer || '').split('（')[0];
  const opts = PACKERS.map(p => {
    const sel = p && hiPacker && p.startsWith(hiPacker) ? ' selected' : '';
    return `<option${sel}>${p}</option>`;
  }).join('');
  const rmBtn = removable
    ? `<button class="btn-remove-block" onclick="removeBlock('${key}',${n})">✕</button>`
    : '';
  const label = n > 0
    ? `<div class="block-label">搬入票 ${n+1}ページ目</div>`
    : '';
  return `<div class="input-block" id="${key}_blk_${n}">${label}${rmBtn}
    <div class="row-3">
      <div class="field"><label>BKG番号 ★</label><input class="required" id="${key}_bkg_${n}" value="${hi.bkg||''}" placeholder="例: TYOG71676500"></div>
      <div class="field"><label>コンテナ番号 ★</label><input class="required" id="${key}_ct_${n}" value="${hi.ct||''}" placeholder="例: ONEU5019216"></div>
      <div class="field"><label>PACKER ★</label><select id="${key}_packer_${n}">${opts}</select></div>
    </div>
    <div class="row-4">
      <div class="field"><label>シール番号</label><input id="${key}_seal_${n}" value="${hi.seal_no||''}" placeholder="例: DYL154005"></div>
      <div class="field"><label>正味重量 (kg)</label><input id="${key}_nw_${n}" value="${hi.n_w||''}" placeholder="例: 22280"></div>
      <div class="field"><label>風袋重量 (kg)</label><input id="${key}_tw_${n}" value="${hi.t_w||''}" placeholder="例: 3700"></div>
      <div class="field"><label>梱数</label><input id="${key}_bales_${n}" value="${hi.bales||''}" placeholder="例: 22"></div>
    </div>
    <div class="row-half">
      <div class="field"><label>作業日</label><input id="${key}_date_${n}" value="${hi.work_date||''}" placeholder="例: 2026-05-07"></div>
    </div>
  </div>`;
}

function addBlock(key) {
  const n   = blkCnt[key]++;
  const tmp = document.createElement('div');
  tmp.innerHTML = _blockHtml(key, n, {}, true);
  document.getElementById(key + '_blocks').appendChild(tmp.firstElementChild);
}

function removeBlock(key, n) {
  const el = document.getElementById(`${key}_blk_${n}`);
  if (el) el.remove();
}

// ── 初期化 ────────────────────────────────────────────────
async function init() {
  const ok = await _checkAuth();
  if (!ok) {
    document.getElementById('login-gate').style.display = 'flex';
    document.getElementById('main-content').style.display = 'none';
    return;
  }
  document.getElementById('login-gate').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';

  const items = Object.values(CONFIRMED_DATA).filter(i => i.status !== "スキップ");
  const total = items.length;
  const done  = items.filter(i => i.status === "確認完了").length;

  const ocr = items.filter(i => i.failure_type === "OCR完全失敗").length;
  const bkg = items.filter(i => i.failure_type === "BKG未マッチ").length;
  const bdg = document.getElementById("badge-area");
  if (ocr > 0) bdg.innerHTML += `<span class="badge badge-red">OCR失敗 ${ocr}件</span>`;
  if (bkg > 0) bdg.innerHTML += `<span class="badge badge-amber">BKG未マッチ ${bkg}件</span>`;

  const gen = CONFIRMED_DATA[Object.keys(CONFIRMED_DATA)[0]]?.generated_at || "";
  document.getElementById("page-meta").innerHTML =
    `生成: ${gen}<br>合計 ${total}件 / 確認済 ${done}件`;

  updateProgress();

  const area = document.getElementById("cards-area");
  Object.entries(CONFIRMED_DATA).forEach(([key, item]) => {
    state[key] = { ...item };
    area.appendChild(buildCard(key, item));
  });

  if (allDone()) showSummary();
}

// ── カード生成 ─────────────────────────────────────────────
function buildCard(key, item) {
  const div = document.createElement("div");
  div.className = "card" + (item.status === "確認完了" ? " done" : "");
  div.id = "card-" + key.replace(/\./g, "_");

  let hiArr = item.human_input || [];
  if (!Array.isArray(hiArr)) hiArr = Object.keys(hiArr).length ? [hiArr] : [];
  if (hiArr.length === 0) hiArr = [{}];
  blkCnt[key] = hiArr.length;

  const pageCount = item.page_count || 0;
  const mpWarn = pageCount > 1
    ? `<div class="multipage-warn">⚠️ 複数ページ (${pageCount}p) 検出 — 搬入票が複数ある場合は「+ 別の搬入票を追加」で追加してください</div>`
    : '';

  const blocksHtml = hiArr.map((hi, n) => _blockHtml(key, n, hi, n > 0)).join('');

  const typeClass = item.failure_type === "OCR完全失敗" ? "badge-red" : "badge-amber";
  const ocr_bkg = item.ocr_bkg?.length ? item.ocr_bkg.join("・") : "未読取";
  const ocr_ct  = item.ocr_ct?.length  ? item.ocr_ct.join("・")  : "未読取";
  const est     = item.packer_estimate ? `${item.packer_estimate} 推定` : "不明";
  const fax     = item.fax_number ? ` · FAX ${item.fax_number}` : "";
  const recv    = item.received_at ? item.received_at.replace("T"," ").substring(0,16) : "";

  const doneText = item.status === "確認完了" && item.confirmed_by
    ? `✅ ${item.confirmed_by}さんが確認完了しました`
    : '✅ 確認完了 — ご協力ありがとうございます。';

  div.innerHTML = `
    <div class="card-header">
      <div>
        <div class="filename">${item.fax_file}</div>
        <div class="meta">受信: ${recv} · ${est}${fax}</div>
      </div>
      <div class="spacer"></div>
      <span class="badge ${typeClass}" style="margin-right:8px;">${item.failure_type}</span>
      <a class="btn-pdf" href="https://leenear.sharepoint.com/sites/leenearsite1/Shared%20Documents/%E5%8F%A4%E7%B4%99/-.%20%E5%8F%A4%E7%B4%99%E6%9B%B8%E9%A1%9E/%E2%96%B2%20LEENAI%20%E9%80%9A%E9%96%A2%E4%BD%9C%E6%A5%AD%E4%B8%AD/PHOTO/_FAX/_CHECK_FAX/${encodeURIComponent(item.fax_file)}" target="_blank">📄 PDFを開く</a>
    </div>
    <div class="card-body">
      <div class="ocr-info">
        OCR読取: BKG <span class="highlight">${ocr_bkg}</span> &nbsp;/&nbsp;
        コンテナ <span class="highlight">${ocr_ct}</span>
        &nbsp;—&nbsp; ${item.detail || ""}
      </div>
      ${mpWarn}
      <div class="section-label">搬入票を見ながら入力してください</div>
      <div id="${key}_blocks">${blocksHtml}</div>
      <button class="btn-add-block" onclick="addBlock('${key}')">+ 別の搬入票を追加</button>
      <div class="card-footer">
        <button class="btn-skip" onclick="skipItem('${key}')">スキップ</button>
        <button class="btn-confirm" onclick="confirmItem('${key}')">✓ 確認完了</button>
      </div>
    </div>
    <div class="done-overlay${item.status === '確認完了' ? ' show' : ''}" id="done-${key}">
      ${doneText}
    </div>`;
  return div;
}

// ── 確認完了 ──────────────────────────────────────────────
function confirmItem(key) {
  const blocks = document.getElementById(key + '_blocks').querySelectorAll('.input-block');
  const inputs = [];
  for (const block of blocks) {
    const n   = block.id.replace(key + '_blk_', '');
    const bkg = (document.getElementById(`${key}_bkg_${n}`)?.value    || '').trim();
    const ct  = (document.getElementById(`${key}_ct_${n}`)?.value     || '').trim();
    const pac = (document.getElementById(`${key}_packer_${n}`)?.value || '');
    if (!bkg || !ct || !pac) { alert("BKG番号・コンテナ番号・PACKERは必須です。"); return; }
    inputs.push({
      bkg, ct, packer: pac,
      seal_no:   (document.getElementById(`${key}_seal_${n}`)?.value  || '').trim(),
      n_w:       (document.getElementById(`${key}_nw_${n}`)?.value    || '').trim(),
      t_w:       (document.getElementById(`${key}_tw_${n}`)?.value    || '').trim(),
      bales:     (document.getElementById(`${key}_bales_${n}`)?.value || '').trim(),
      work_date: (document.getElementById(`${key}_date_${n}`)?.value  || '').trim(),
    });
  }
  state[key].status       = "確認完了";
  state[key].human_input  = inputs;
  state[key].confirmed_by = userName;
  state[key].confirmed_at = new Date().toISOString();

  const card   = document.getElementById("card-" + key.replace(/\./g, "_"));
  card.classList.add("done");
  const doneEl = document.getElementById("done-" + key);
  const t      = new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});
  doneEl.textContent = `✅ ${userName || 'ユーザー'}さんが確認完了しました（${t}）`;
  doneEl.classList.add("show");
  updateProgress();
  if (allDone()) showSummary();
}

// ── スキップ ──────────────────────────────────────────────
function skipItem(key) {
  state[key].status = "スキップ";
  const card = document.getElementById("card-" + key.replace(/\./g,"_"));
  card.style.opacity = "0.4";
  updateProgress();
  if (allDone()) showSummary();
}

// ── 進捗 ─────────────────────────────────────────────────
function updateProgress() {
  const total = Object.keys(state).length;
  const done  = Object.values(state).filter(i => i.status !== "未確認").length;
  const pct   = total > 0 ? Math.round(done/total*100) : 0;
  document.getElementById("progress").style.width = pct + "%";
}

function allDone() {
  return Object.values(state).every(i => i.status !== "未確認");
}

// ── サマリー & ダウンロード ───────────────────────────────
function showSummary() {
  const area = document.getElementById("summary-area");
  area.classList.add("show");

  const confirmed = Object.values(state).filter(i => i.status === "確認完了");
  const tbody = confirmed.flatMap(i => {
    const arr = Array.isArray(i.human_input) ? i.human_input : [i.human_input || {}];
    return arr.map((hi, idx) => `
      <tr>
        <td>${i.fax_file}${arr.length > 1 ? ` (${idx+1}/${arr.length})` : ''}</td>
        <td>${hi?.bkg || "-"}</td><td>${hi?.ct || "-"}</td>
        <td>${hi?.packer || "-"}</td><td>${hi?.seal_no || "-"}</td>
        <td>${hi?.n_w || "-"}</td><td>${hi?.t_w || "-"}</td>
        <td>${hi?.bales || "-"}</td>
      </tr>`);
  }).join("");

  document.getElementById("summary-table").innerHTML = `
    <tr><th>ファイル</th><th>BKG</th><th>コンテナ</th><th>PACKER</th><th>シール</th><th>N/W</th><th>T/W</th><th>梱数</th></tr>
    ${tbody}`;
  area.scrollIntoView({ behavior: "smooth" });
}

function downloadResults() {
  const results = {
    generated_at: new Date().toISOString(),
    type:  "check_fax_confirmed",
    items: Object.values(state).filter(i => i.status === "確認完了")
  };
  const blob = new Blob([JSON.stringify(results, null, 2)], {type:"application/json"});
  const a    = document.createElement("a");
  a.href     = URL.createObjectURL(blob);
  a.download = "check_fax_results_" + new Date().toISOString().slice(0,10) + ".json";
  a.click();
}

init();
</script>
</body>
</html>
