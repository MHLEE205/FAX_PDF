<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>認証中... | LEENAI</title>
<style>
body { font-family: 'Meiryo', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f5f5f5; color: #555; font-size: 14px; }
.msg { text-align: center; }
.spinner { width: 32px; height: 32px; border: 3px solid #ddd; border-top-color: #0078d4; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="msg">
  <div class="spinner"></div>
  <p>認証処理中...</p>
</div>
<script>
(async function () {
  const CLIENT_ID   = 'f071a165-5e9b-44bf-b6a1-baba654524db';
  const TENANT_ID   = 'a56988ff-c2b8-4df8-9727-889ad4205198';
  const REDIRECT    = 'https://mhlee205.github.io/FAX_PDF/';
  const FORM_URL    = 'check_fax_form_latest.html';

  const params = new URLSearchParams(window.location.search);
  const code   = params.get('code');
  const state  = params.get('state');

  if (!code) {
    window.location.href = FORM_URL;
    return;
  }

  const savedState = sessionStorage.getItem('oauth_state');
  if (state && savedState && state !== savedState) {
    document.querySelector('p').textContent = 'state不一致エラー。もう一度お試しください。';
    return;
  }

  const verifier = sessionStorage.getItem('pkce_verifier');
  if (!verifier) {
    window.location.href = FORM_URL;
    return;
  }

  const body = new URLSearchParams({
    grant_type:    'authorization_code',
    client_id:     CLIENT_ID,
    code:          code,
    redirect_uri:  REDIRECT,
    code_verifier: verifier
  });

  try {
    const resp = await fetch(
      `https://login.microsoftonline.com/${TENANT_ID}/oauth2/v2.0/token`,
      { method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: body.toString() }
    );
    const data = await resp.json();
    if (data.access_token) {
      sessionStorage.setItem('fax_access_token', data.access_token);
      sessionStorage.removeItem('pkce_verifier');
      sessionStorage.removeItem('oauth_state');
      window.location.href = FORM_URL;
    } else {
      document.querySelector('p').textContent =
        '認証失敗: ' + (data.error_description || data.error || '不明なエラー');
    }
  } catch (e) {
    document.querySelector('p').textContent = '認証エラー: ' + e.message;
  }
})();
</script>
</body>
</html>
