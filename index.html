.section-label { font-size: 10px; color: #aaa; letter-spacing: 0.05em; margin-bottom: 6px; text-transform: uppercase; }

.field label { font-size: 11px; color: #888; font-weight: 500; }
.field input, .field select { font-size: 12px; padding: 5px 8px; border: 1px solid #ddd; border-radius: 4px; background: #fff; color: #333; width: 100%; }
.field input:focus, .field select:focus { outline: none; border-color: #4a90d9; }
.field input.required { border-color: #f0c040; }
.field input.filled { border-color: #27ae60; background: #f8fff8; }
.card-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #f0f0f0; }
.btn-skip { font-size: 12px; padding: 5px 14px; border: 1px solid #ddd; border-radius: 4px; background: #f8f8f8; color: #888; cursor: pointer; }
.btn-skip:hover { background: #eee; }
.btn-confirm { font-size: 12px; padding: 5px 16px; border: 1px solid #4a90d9; border-radius: 4px; background: #4a90d9; color: #fff; cursor: pointer; font-weight: 500; }
.btn-confirm:hover { background: #357abd; }
.done-overlay { display: none; padding: 12px 14px; background: #f0fff0; border-top: 1px solid #a8d5b0; font-size: 12px; color: #27ae60; }
.done-overlay.show { display: block; }
.summary { background: #fff; border-radius: 8px; border: 1px solid #e0e0e0; padding: 16px 20px; margin-top: 16px; display: none; }

.summary h2 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: #27ae60; }
.summary-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.summary-table th { background: #f8f8f8; padding: 6px 8px; border: 1px solid #eee; text-align: left; font-weight: 500; color: #666; }

// ── PACKER リスト ─────────────────────────────────────────
const PACKERS = [
  "","OOMOTO（大本紙料）","KAWASUZU（川勝商事）","KANEKO（金子商事）",
  "KOKUSAI（国際紙業）","KYOKUSHIN（極真）","DAIWA（大和紙料）",
  "TOKYO","MIYAZAKI","HANWA","FUJI","ECOSTYLE","KODUKA",
  "KUNIYOSHI","ISHIZAKA","OKINAWA","JOP","SK_TRADING","その他"
];

// ── 状態管理 ──────────────────────────────────────────────
const state = {};

// ── 初期化 ────────────────────────────────────────────────
function init() {
  const items = Object.values(CONFIRMED_DATA).filter(i => i.status !== "スキップ");
  const total = items.length;
  const done  = items.filter(i => i.status === "確認完了").length;

  // badges
  const ocr   = items.filter(i => i.failure_type === "OCR完全失敗").length;
  const bkg   = items.filter(i => i.failure_type === "BKG未マッチ").length;
  const bdg = document.getElementById("badge-area");
  if (ocr > 0) bdg.innerHTML += `<span class="badge badge-red">OCR失敗 ${ocr}件</span>`;
  if (bkg > 0) bdg.innerHTML += `<span class="badge badge-amber">BKG未マッチ ${bkg}件</span>`;

  // meta
  const gen = CONFIRMED_DATA[Object.keys(CONFIRMED_DATA)[0]]?.generated_at || "";
  document.getElementById("page-meta").innerHTML =
    `生成: ${gen}<br>合計 ${total}件 / 確認済 ${done}件`;

  updateProgress();

  // cards
  const area = document.getElementById("cards-area");
  Object.entries(CONFIRMED_DATA).forEach(([key, item]) => {
    state[key] = { ...item };
    area.appendChild(buildCard(key, item));
  });

  if (allDone()) showSummary();
}

// ── カード生成 ─────────────────────────────────────────────
function buildCard(key, item) {
  const div = document.createElement("div");
  div.className = "card" + (item.status === "確認完了" ? " done" : "");
  div.id = "card-" + key.replace(/\./g, "_");

  const typeClass = item.failure_type === "OCR完全失敗" ? "badge-red" : "badge-amber";
  const ocr_bkg = item.ocr_bkg?.length ? item.ocr_bkg.join("・") : "未読取";
  const ocr_ct  = item.ocr_ct?.length  ? item.ocr_ct.join("・")  : "未読取";
  const est     = item.packer_estimate ? `${item.packer_estimate} 推定` : "不明";
  const fax     = item.fax_number ? ` · FAX ${item.fax_number}` : "";
  const recv    = item.received_at ? item.received_at.replace("T"," ").substring(0,16) : "";
  const packer_opts = PACKERS.map(p => {
    const sel = p && item.packer_estimate && p.startsWith(item.packer_estimate) ? " selected" : "";
    return `<option${sel}>${p}</option>`;
  }).join("");

  const hi = item.human_input || {};

  div.innerHTML = `
    <div class="card-header">
      <div>
        <div class="filename">${item.fax_file}</div>
        <div class="meta">受信: ${recv} · ${est}${fax}</div>
      </div>
      <div class="spacer"></div>
      <span class="badge ${typeClass}" style="margin-right:8px;">${item.failure_type}</span>
      <a class="btn-pdf" href="${item.fax_path || '#'}" target="_blank">📄 PDFを開く</a>
    </div>
    <div class="card-body">
      <div class="ocr-info">
        OCR読取: BKG <span class="highlight">${ocr_bkg}</span> &nbsp;/&nbsp;
        コンテナ <span class="highlight">${ocr_ct}</span>
        &nbsp;—&nbsp; ${item.detail || ""}
      </div>
      <div class="section-label">搬入票を見ながら入力してください</div>
      <div class="row-3">
        <div class="field">
          <label>BKG番号 ★</label>
          <input class="required" id="${key}_bkg" value="${hi.bkg || ocr_bkg !== '未読取' ? (hi.bkg || item.ocr_bkg?.[0] || '') : ''}" placeholder="例: TYOG71676500">
        </div>
        <div class="field">
          <label>コンテナ番号 ★</label>
          <input class="required" id="${key}_ct" value="${hi.ct || (item.ocr_ct?.[0] || '')}" placeholder="例: ONEU5019216">
        </div>
        <div class="field">
          <label>PACKER ★</label>
          <select id="${key}_packer">${packer_opts}</select>
        </div>
      </div>
      <div class="row-4">
        <div class="field"><label>シール番号</label><input id="${key}_seal" value="${hi.seal_no || ''}" placeholder="例: DYL154005"></div>
        <div class="field"><label>正味重量 (kg)</label><input id="${key}_nw" value="${hi.n_w || ''}" placeholder="例: 22280"></div>
        <div class="field"><label>風袋重量 (kg)</label><input id="${key}_tw" value="${hi.t_w || ''}" placeholder="例: 3700"></div>
        <div class="field"><label>梱数</label><input id="${key}_bales" value="${hi.bales || ''}" placeholder="例: 22"></div>
      </div>
      <div class="row-half">
        <div class="field"><label>作業日</label><input id="${key}_date" value="${hi.work_date || ''}" placeholder="例: 2026-05-07"></div>
      </div>
      <div class="card-footer">
        <button class="btn-skip" onclick="skipItem('${key}')">スキップ</button>
        <button class="btn-confirm" onclick="confirmItem('${key}')">✓ 確認完了</button>
      </div>
    </div>
    <div class="done-overlay${item.status === '確認完了' ? ' show' : ''}" id="done-${key}">
      ✅ 確認完了 — ご協力ありがとうございます。いただいたデータをもとにシステムを改善してまいります。
    </div>`;
  return div;
}

// ── 確認完了 ──────────────────────────────────────────────
function confirmItem(key) {
  const bkg    = document.getElementById(key+"_bkg").value.trim();
  const ct     = document.getElementById(key+"_ct").value.trim();
  const packer = document.getElementById(key+"_packer").value;
  if (!bkg || !ct || !packer) {
    alert("BKG番号・コンテナ番号・PACKERは必須です。");
    return;
  }
  state[key].status = "確認完了";
  state[key].human_input = {
    bkg, ct, packer,
    seal_no:   document.getElementById(key+"_seal").value.trim(),
    n_w:       document.getElementById(key+"_nw").value.trim(),
    t_w:       document.getElementById(key+"_tw").value.trim(),
    bales:     document.getElementById(key+"_bales").value.trim(),
    work_date: document.getElementById(key+"_date").value.trim(),
  };
  state[key].confirmed_at = new Date().toISOString();

  const card = document.getElementById("card-"+key.replace(/\./g,"_"));
  card.classList.add("done");
  document.getElementById("done-"+key).classList.add("show");
  updateProgress();
  if (allDone()) showSummary();
}

// ── スキップ ──────────────────────────────────────────────
function skipItem(key) {
  state[key].status = "スキップ";
  const card = document.getElementById("card-"+key.replace(/\./g,"_"));
  card.style.opacity = "0.4";
  updateProgress();
  if (allDone()) showSummary();
}

// ── 進捗 ─────────────────────────────────────────────────
function updateProgress() {
  const total  = Object.keys(state).length;
  const done   = Object.values(state).filter(i => i.status !== "未確認").length;
  const pct    = total > 0 ? Math.round(done/total*100) : 0;
  document.getElementById("progress").style.width = pct + "%";
}

function allDone() {
  return Object.values(state).every(i => i.status !== "未確認");
}

// ── サマリー & ダウンロード ───────────────────────────────

  const area = document.getElementById("summary-area");
  area.classList.add("show");

  const confirmed = Object.values(state).filter(i => i.status === "確認完了");
  const tbody = confirmed.map(i => `
    <tr>
      <td>${i.fax_file}</td>
      <td>${i.human_input?.bkg || "-"}</td>
      <td>${i.human_input?.ct || "-"}</td>
      <td>${i.human_input?.packer || "-"}</td>
      <td>${i.human_input?.seal_no || "-"}</td>
      <td>${i.human_input?.n_w || "-"}</td>
      <td>${i.human_input?.t_w || "-"}</td>
      <td>${i.human_input?.bales || "-"}</td>
    </tr>`).join("");

  document.getElementById("summary-table").innerHTML = `
    <tr><th>ファイル</th><th>BKG</th><th>コンテナ</th><th>PACKER</th><th>シール</th><th>N/W</th><th>T/W</th><th>梱数</th></tr>
    ${tbody}`;

  area.scrollIntoView({ behavior: "smooth" });
}

function downloadResults() {
  const results = {
    generated_at: new Date().toISOString(),
    type: "check_fax_confirmed",
    items: Object.values(state).filter(i => i.status === "確認完了")
  };
  const blob = new Blob([JSON.stringify(results, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "check_fax_results_" + new Date().toISOString().slice(0,10) + ".json";
  a.click();
}

init();
</script>
</body>
</html>
